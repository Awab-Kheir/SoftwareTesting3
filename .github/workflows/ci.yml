name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: تشغيل Gitleaks
        uses: zricethezav/gitleaks-action@v2

      - name: تثبيت بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: تثبيت pytest
        run: pip install pytest

      - name: تشغيل الاختبارات
        run: pytest
